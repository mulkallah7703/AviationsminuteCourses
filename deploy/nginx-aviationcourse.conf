# Nginx site for Aviation LMS (Ubuntu VPS)
# Install:
#   sudo cp deploy/nginx-aviationcourse.conf /etc/nginx/sites-available/aviationcourse
#   sudo ln -sf /etc/nginx/sites-available/aviationcourse /etc/nginx/sites-enabled/aviationcourse
#   sudo nginx -t && sudo systemctl reload nginx
#
# PM2 (API only — static files served by Nginx):
#   npm run build
#   pm2 delete aviation-lms 2>/dev/null || true
#   pm2 start ecosystem.config.cjs
#   pm2 save

server {
    listen 80;
    # listen 443 ssl http2;
    server_name _;

    root /var/www/Aviationcourse/AviationsminuteCourses/dist;
    index index.html;

    client_max_body_size 2m;

    # Auth API → Express (PM2 :4000). MUST be before the SPA fallback.
    location /api/ {
        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 15s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    location /health {
        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # SPA — only for non-API routes
    location / {
        try_files $uri $uri/ /index.html;
    }
}
